name: Publish

on:
  release:
    types: [published]

concurrency:
  group: npm-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - name: Verify release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: test "$RELEASE_TAG" = "v$(node -p "require('./package.json').version")"
      - run: npm ci
      - run: npm run release:check
      - name: Use npm trusted publishing
        run: npm install --global npm@latest
      - name: Select npm distribution tag
        id: distribution
        run: |
          version=$(node -p "require('./package.json').version")
          case "$version" in
            *-alpha.*) tag=alpha ;;
            *-beta.*) tag=beta ;;
            *-rc.*) tag=next ;;
            *-*) echo "Unsupported prerelease label: $version" >&2; exit 1 ;;
            *) tag=latest ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - run: npm publish --access public --provenance --tag "${{ steps.distribution.outputs.tag }}"
