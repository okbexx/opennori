name: Publish

on:
  release:
    types: [published]

concurrency:
  group: npm-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - name: Verify release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: test "$RELEASE_TAG" = "v$(node -p "require('./package.json').version")"
      - name: Refuse prerelease versions
        run: version=$(node -p "require('./package.json').version") && test "${version#*-}" = "$version"
      - run: npm ci
      - run: npm run release:check
      - name: Use npm trusted publishing
        run: npm install --global npm@latest
      - run: npm publish --ignore-scripts --access public --provenance --tag latest
